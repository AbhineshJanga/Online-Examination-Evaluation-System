<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Exam</title>
    <link rel="stylesheet" href="../../css/teacher-dashboard.css">
</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Exam Portal</h2>
                <p>Faculty Panel</p>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="create-exam.html">Create Exam</a>
                <a href="manage-exams.html" class="active">Manage Exams</a>
                <a href="submissions.html">Submissions</a>
                <a href="results.html">Results</a>
                <a href="profile.html">Profile</a>
                <a href="../login.html">Logout</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-setting dark-toggle">Dark Mode 🌙</a>
                <a href="#" class="sidebar-setting">Help ❓</a>
                <a href="#" class="sidebar-setting">Settings ⚙️</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="topbar">
                <h1>Edit Exam</h1>
                <div class="profile-box">
                    <span>User</span>
                </div>
            </header>

            <section class="form-section">

                <div class="section-header">
                    <h2>Update Exam Details</h2>
                </div>

                <form class="exam-form">

                    <!-- Basic Info -->
                    <div class="form-grid">

                        <div class="form-group">
                            <label>Title</label>
                            <input type="text" name="title" placeholder="Enter exam title" required>
                        </div>

                        <div class="form-group full-width">
                            <label>Description</label>
                            <textarea name="description" rows="4" placeholder="Enter exam description"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Duration (Minutes)</label>
                            <input type="number" name="duration" min="1" placeholder="Enter duration" required>
                        </div>

                        <div class="form-group">
                            <label>Exam Date</label>
                            <input type="date" name="examDate" required>
                        </div>

                    </div>

                    <!-- Question Section -->
                    <div class="question-section">

                        <div class="section-header">
                            <h3>Questions</h3>
                            <button type="button" class="add-question-btn" id="addQuestionBtn">
                                + Add Question
                            </button>
                        </div>

                        <div id="questionsContainer">
                            <p class="question-placeholder">No questions added yet.</p>
                        </div>

                    </div>

                    <!-- Update Button -->
                    <div class="form-actions">
                        <button type="submit" class="primary-btn">Update Exam</button>
                    </div>

                </form>

            </section>

        </main>

    </div>

    <script src="../../js/teacher/edit-exam.js"></script>
    <script src="../../js/common.js"></script>


</body>

</html>
