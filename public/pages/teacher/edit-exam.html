<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Exam</title>
    <link rel="stylesheet" href="../../css/teacher-dashboard.css">
</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Exam Portal</h2>
                <p>Faculty Panel</p>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="create-exam.html">Create Exam</a>
                <a href="manage-exams.html" class="active">Manage Exams</a>
                <a href="submissions.html">Submissions</a>
                <a href="results.html">Results</a>
                <a href="profile.html">Profile</a>
                <a href="../login.html">Logout</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-setting dark-toggle">Dark Mode 🌙</a>
                <a href="#" class="sidebar-setting">Help ❓</a>
                <a href="#" class="sidebar-setting">Settings ⚙️</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="topbar">
                <h1>Edit Exam</h1>
                <div class="profile-box">
                    <span>User</span>
                </div>
            </header>

            <section class="form-section">

                <div class="section-header">
                    <h2>Update Exam Details</h2>
                </div>

                <form class="exam-form">

                    <!-- Basic Info -->
                    <div class="form-grid">

                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" value="Mathematics">
                        </div>

                        <div class="form-group">
                            <label>Course ID</label>
                            <input type="text" value="MATH101">
                        </div>

                        <div class="form-group full-width">
                            <label>Instructions</label>
                            <textarea rows="4">Answer all questions carefully.</textarea>
                        </div>

                        <div class="form-group">
                            <label>Exam Format</label>
                            <select>
                                <option selected>MCQ</option>
                                <option>Code Typing</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Exam Date</label>
                            <input type="date" value="2026-02-20">
                        </div>

                        <div class="form-group">
                            <label>Duration (Minutes)</label>
                            <input type="number" value="60">
                        </div>

                    </div>

                    <!-- Question Section -->
                    <div class="question-section">

                        <div class="section-header">
                            <h3>Questions</h3>
                            <button type="button" class="add-question-btn" id="addQuestionBtn">
                                + Add Question
                            </button>
                        </div>

                        <div id="questionsContainer">

                            <!-- Existing Question 1 -->
                            <div class="question-card">
                                <div class="question-header">
                                    <h4>Question 1</h4>
                                    <button type="button" class="remove-btn">Remove</button>
                                </div>

                                <div class="form-group">
                                    <label>Question Text</label>
                                    <textarea rows="3">-</textarea>
                                </div>

                                <div class="options-grid">
                                    <input type="text" value="3">
                                    <input type="text" value="4">
                                    <input type="text" value="5">
                                    <input type="text" value="6">
                                </div>

                                <div class="form-group">
                                    <label>Correct Answer</label>
                                    <select>
                                        <option>-</option>
                                        <option>-</option>
                                        <option>-</option>
                                        <option>-</option>
                                    </select>
                                </div>
                            </div>

                        </div>

                    </div>

                    <!-- Update Button -->
                    <div class="form-actions">
                        <button type="submit" class="primary-btn">Update Exam</button>
                    </div>

                </form>

            </section>

        </main>

    </div>

    <script src="../../js/teacher/edit-exam.js"></script>
    <script src="../../js/common.js"></script>


</body>

</html>
