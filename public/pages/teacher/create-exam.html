<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Exam</title>

    <!-- Correct CSS Path -->
    <link rel="stylesheet" href="../../css/teacher-dashboard.css">
</head>


<body>


    <!-- Main Grid Container -->
    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Exam Portal</h2>
                <p>Faculty Panel</p>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="create-exam.html" class="active">Create Exam</a>
                <a href="manage-exams.html">Manage Exams</a>
                <a href="submissions.html">Submissions</a>
                <a href="results.html">Results</a>
                <a href="profile.html">Profile</a>
                <a href="../login.html">Logout</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-setting dark-toggle">Dark Mode 🌙</a>
                <a href="#" class="sidebar-setting">Help ❓</a>
                <a href="#" class="sidebar-setting">Settings ⚙️</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <!-- Top Bar -->
            <header class="topbar">
                <h1>Welcome</h1>
                <div class="profile-box">
                    <span>User</span>
                </div>
            </header>

            <section class="form-section">

                <div class="section-header">
                    <h2>Create New Exam</h2>
                </div>

                <form class="exam-form">

                    <!-- Basic Info -->
                    <div class="form-grid">

                        <div class="form-group">
                            <label>Subject</label>
                            <input type="text" placeholder="Enter subject name">
                        </div>

                        <div class="form-group">
                            <label>Course ID</label>
                            <input type="text" placeholder="Enter course ID">
                        </div>

                        <div class="form-group full-width">
                            <label>Instructions</label>
                            <textarea rows="4" placeholder="Enter exam instructions"></textarea>
                        </div>

                        <div class="form-group">
                            <label>Exam Format</label>
                            <select>
                                <option>MCQ</option>
                                <option>Code Typing</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Exam Date</label>
                            <input type="date">
                        </div>

                        <div class="form-group">
                            <label>Duration (Minutes)</label>
                            <input type="number" placeholder="Enter duration">
                        </div>

                    </div>

                    <!-- Question Section -->
                    <div class="question-section">

                        <div class="section-header">
                            <h3>Questions</h3>
                            <button type="button" class="add-question-btn" id="addQuestionBtn">
                                + Add Question
                            </button>
                        </div>

                        <div id="questionsContainer">
                            <p class="question-placeholder">No questions added yet.</p>
                        </div>

                    </div>


                    <!-- Submit -->
                    <div class="form-actions">
                        <button type="submit" class="primary-btn">Create Exam</button>
                    </div>

                </form>

            </section>


        </main>

    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="../../js/socket.js"></script>
    <script src="../../js/common.js"></script>
    <script src="../../js/teacher/create-exam.js"></script>

</body>

</html>
