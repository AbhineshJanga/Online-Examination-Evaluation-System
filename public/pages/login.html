<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Details</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: aliceblue;
        }

        .login-card {
            background-color: white;
            width: 100%;
            max-width: 420px;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .login-card hr {
            border: none;
            height: 1px;
            background: #ddd;
            margin: 15px 0;
        }

        .text {
            text-align: center;
            font-size: 18px;
            font-weight: bolder;
            color: #030303;
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
        }


        input {
            width: 100%;
            box-sizing: border-box;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #2575fc;
        }

        button {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 4px;
            background: #2575fc;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1d5edc;
        }

        .back {
            text-align: center;
            margin-top: 15px;
        }

        .back a {
            text-decoration: none;
            color: #2575fc;
            font-size: 14px;
        }

        .password {
            text-align: center;
            margin-top: 15px;
        }

        .password a {
            text-decoration: none;
            color: #2575fc;
            font-size: 14px;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 20px;
            }

            .text {
                font-size: 16px;
            }
        }

        a {
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="login-card">
        <div class="text">Please login using your student credentials</div>

        <form id="loginform">
            <label>Username</label>
            <input type="text" placeholder="Enter username" required>

            <label>Password</label>
            <input type="password" placeholder="Enter password" required>

            <button type="submit">Login</button>
        </form>

        <hr>

        <div class="back">
            <a href="../index.html">Back to homepage</a>
        </div>

        <div class="password">
            <a href="">Forgot Password</a>
        </div>
    </div>
    <script>
        document.addEventListener("DOMContentLoaded", function () {

            const params = new URLSearchParams(window.location.search);
            const role = params.get("role");

            const textDiv = document.querySelector(".text");
            const form = document.getElementById("loginform");

            if (!role) {
                textDiv.innerText = "Access denied. Please login from homepage.";
                form.style.display = "none";
                return;
            }

            // Set heading
            textDiv.innerText = `Please login using your ${role} credentials`;

            form.addEventListener("submit", function (e) {
                e.preventDefault();

                const username = form.querySelector('input[type="text"]').value.trim();
                const password = form.querySelector('input[type="password"]').value.trim();

                if (username === "") {
                    alert("Username is required.");
                    return;
                }

                if (password === "") {
                    alert("Password is required.");
                    return;
                }

                // Save session
                localStorage.setItem("loggedInUser", JSON.stringify({
                    username: username,
                    role: role
                }));

                // Redirect correctly (IMPORTANT FIX)
                window.location.href = `./${role}/dashboard.html`;
            });

        });
    </script>




</body>

</html>
