<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Manage Users</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/admin-dashboard.css">
</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Exam Portal</h2>
                <p>Admin Panel</p>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="manage-users.html" class="active">Manage Users</a>
                <a href="monitor-exams.html">Monitor Exams</a>
                <a href="results-overview.html">Results Overview</a>
                <a href="profile.html">Profile</a>
                <a href="../login.html">Logout</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-setting dark-toggle">Dark Mode 🌙</a>
                <a href="#" class="sidebar-setting">Help ❓</a>
                <a href="#" class="sidebar-setting">Settings ⚙️</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="topbar">
                <h1>Manage Users</h1>
                <div class="profile-box">
                    <span>AD</span>
                </div>
            </header>

            <section class="recent-section">

                <!-- Top Controls -->
                <div class="controls">

                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search by name or email">
                    </div>

                    <div class="filter-bar">
                        <select id="roleFilter">
                            <option value="all">All Roles</option>
                            <option value="student">Students</option>
                            <option value="faculty">Faculty</option>
                        </select>

                        <select id="statusFilter">
                            <option value="all">All Status</option>
                            <option value="active">Active</option>
                            <option value="disabled">Disabled</option>
                        </select>
                    </div>

                </div>

                <!-- Users Table -->
                <div class="table-container">
                    <table class="submission-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Last Login</th>
                                <th>Actions</th>
                            </tr>
                        </thead>

                        <tbody id="usersTableBody">
                        </tbody>
                    </table>
                </div>

            </section>

        </main>

    </div>
    <script src="../../js/common.js"></script>
    <script type="module" src="../../js/admin/manage-users.js"></script>
</body>

</html>
