<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Results Overview</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../../css/admin-dashboard.css">
</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Exam Portal</h2>
                <p>Admin Panel</p>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="manage-users.html">Manage Users</a>
                <a href="monitor-exams.html">Monitor Exams</a>
                <a href="results-overview.html" class="active">Results Overview</a>
                <a href="profile.html">Profile</a>
                <a href="../login.html">Logout</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-setting dark-toggle">Dark Mode 🌙</a>
                <a href="#" class="sidebar-setting">Help ❓</a>
                <a href="#" class="sidebar-setting">Settings ⚙️</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="topbar">
                <h1>Results Overview</h1>
                <div class="profile-box">
                    <span>AD</span>
                </div>
            </header>

            <!-- Summary Cards -->
            <section class="stats-section">

                <div class="stat-card">
                    <h3>Total Students Appeared</h3>
                    <p id="totalAppeared"></p>
                </div>

                <div class="stat-card">
                    <h3>Total Passed</h3>
                    <p id="totalPassed"></p>
                </div>

                <div class="stat-card">
                    <h3>Total Failed</h3>
                    <p id="totalFailed"></p>
                </div>

                <div class="stat-card">
                    <h3>Pass Percentage</h3>
                    <p id="passPercent"></p>
                </div>

            </section>

            <!-- Exam-wise Performance -->
            <section class="recent-section">

                <div class="section-header">
                    <h2>Exam-wise Performance</h2>
                </div>

                <div class="table-container">
                    <table class="submission-table">
                        <thead>
                            <tr>
                                <th>Exam</th>
                                <th>Total Appeared</th>
                                <th>Passed</th>
                                <th>Failed</th>
                                <th>Pass %</th>
                            </tr>
                        </thead>

                        <tbody id="resultsTableBody"></tbody>
                    </table>
                </div>

            </section>

        </main>

    </div>
    <script src="../../js/common.js"></script>
    <script type="module" src="../../js/admin/results-overview.js"></script>
</body>

</html>
