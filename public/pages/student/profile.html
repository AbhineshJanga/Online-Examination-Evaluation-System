<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Profile</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/student-dashboard.css">
</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Exam</h2>
                <p>Student Panel</p>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="viewExams.html">View Exams</a>
                <a href="my-results.html">My Results</a>
                <a href="profile.html" class="active">Profile</a>
                <a href="../../login.html">Logout</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-setting">Dark Mode 🌙</a>
                <a href="#" class="sidebar-setting">Help ❓</a>
                <a href="#" class="sidebar-setting">Settings ⚙️</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="topbar">
                <h1>My Profile</h1>
                <div class="profile-box">
                    <span>User</span>
                </div>
            </header>

            <!-- Profile Section -->
            <section class="profile-section">

                <div class="profile-card">

                    <div class="profile-avatar">
                        User
                    </div>

                    <div class="profile-details">
                        <p><strong>Full Name:</strong> user</p>
                        <p><strong>Email:</strong> user123@example.com</p>
                        <p><strong>Registration No:</strong> 24BIT0401</p>
                        <p><strong>Department:</strong> SCORE</p>
                        <p><strong>Phone:</strong> 1234567890</p>
                        <p><strong>DOB:</strong> DD-MM-YYYY</p>
                    </div>

                    <div class="profile-actions">
                        <button class="nav-btn primary">Edit Profile</button>
                        <button class="nav-btn">Change Password</button>
                    </div>

                </div>

            </section>

        </main>

    </div>

</body>

</html>
