<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Exam Details</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/student-dashboard.css">
</head>

<body>

    <div class="dashboard-container">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>Exam Portal</h2>
                <p>Student Panel</p>
            </div>

            <nav class="sidebar-menu">
                <a href="dashboard.html">Dashboard</a>
                <a href="viewExams.html" class="active">View Exams</a>
                <a href="my-results.html">My Results</a>
                <a href="profile.html">Profile</a>
                <a href="../login.html">Logout</a>
            </nav>

            <div class="sidebar-footer">
                <a href="#" class="sidebar-setting dark-toggle">Dark Mode 🌙</a>
                <a href="#" class="sidebar-setting">Help ❓</a>
                <a href="#" class="sidebar-setting">Settings ⚙️</a>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">

            <header class="topbar">
                <h1>Exam Details</h1>
                <div class="profile-box">
                    <span>User</span>
                </div>
            </header>

            <!-- Exam Info Card -->
            <section class="exam-details-section">

                <div class="exam-details-card">

                    <h2 class="exam-title"></h2>

                    <p><strong>Date:</strong> <span class="exam-date"></span></p>
                    <p><strong>Time:</strong> <span class="exam-time"></span></p>
                    <p><strong>Total Questions:</strong> <span class="exam-questions"></span></p>
                    <p><strong>Type:</strong> <span class="exam-type"></span></p>
                    <p><strong>Total Marks:</strong> <span class="exam-marks"></span></p>

                    <p class="exam-description"></p>

                    <a href="Attempt-Exam.html" class="start-btn attempt-btn">
                        Attempt Exam
                    </a>

                </div>

                <!-- User Info Card -->
                <div class="user-info-card">
                    <h3>Student Information</h3>
                    <p><strong>Username:</strong> <span class="student-name"></span></p>
                    <p><strong>Email:</strong> <span class="student-email"></span></p>
                </div>


            </section>

        </main>

    </div>
    <script src="../../js/common.js"></script>
    <script src="../../js/student/studentdashboard.js"></script>
    

</body>

</html>
