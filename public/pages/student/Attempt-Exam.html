<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Attempt Exam</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="../../css/student-dashboard.css">
</head>

<body class="exam-body">

    <header class="exam-header">
        <h2 class="exam-title"></h2>


        <div class="exam-header-right">
            <div class="exam-timer">
                ⏱ <span class="timer-display"></span>
            </div>

            <div class="exam-student-name"></div>

        </div>
    </header>

    <!-- Main Exam Container -->
    <div class="exam-container">

        <!-- Question Section -->
        <div class="question-section">
            <h3 class="question-number"></h3>
            <p class="question-text"></p>
        </div>


        <!-- Options Section  -->
        <div class="options-section">

            <div class="options-container"></div>

            <div class="exam-navigation">
                <button class="nav-btn prev-btn">Previous</button>
                <button class="nav-btn primary next-btn">Next</button>
                <button class="nav-btn finish-exam">Finish Exam</button>
            </div>

        </div>


    </div>
    <script src="../../js/student/studentdashboard.js"></script>
</body>

</html>
