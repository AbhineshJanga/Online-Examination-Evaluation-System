<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Exam Management</title>
</head>
<body>
    <h1>Exam Management Test</h1>
    <button id="testGetExams">Test Get Exams</button>
    <button id="testCreateExam">Test Create Exam</button>
    <div id="output"></div>

    <script>
        const API_BASE_URL = "http://localhost:5000/api";
        const output = document.getElementById('output');

        // Test token - you'll need to replace this with a real JWT token
        const testToken = localStorage.getItem('token') || 'your-jwt-token-here';

        document.getElementById('testGetExams').addEventListener('click', async () => {
            try {
                const response = await fetch(`${API_BASE_URL}/exams`, {
                    headers: {
                        'Authorization': `Bearer ${testToken}`,
                        'Content-Type': 'application/json'
                    }
                });

                const data = await response.json();
                output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                output.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });

        document.getElementById('testCreateExam').addEventListener('click', async () => {
            try {
                const testExam = {
                    title: "Test Exam",
                    description: "A test exam for API testing",
                    questions: [
                        {
                            question: "What is 2+2?",
                            options: ["3", "4", "5", "6"],
                            correctAnswer: "4"
                        }
                    ],
                    duration: 30
                };

                const response = await fetch(`${API_BASE_URL}/exams`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${testToken}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(testExam)
                });

                const data = await response.json();
                output.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
            } catch (error) {
                output.innerHTML = `<p style="color: red;">Error: ${error.message}</p>`;
            }
        });
    </script>
</body>
</html>
