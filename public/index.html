<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body {
            margin: 0;
            font-family: sans-serif;
            background-color: aliceblue;
        }

        h1 {
            text-align: center;
            margin: 15px 0;
            font-size: 30px;
            font-weight: 700;
            background: linear-gradient(90deg, #6a11cb, #2575fc);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            display: flex;
            height: 90vh;
        }

        .left {
            width: 60%;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f4f4f4;
            background: linear-gradient(135deg, #6a11cb, #2575fc);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.7);
        }

        .left img {
            max-width: 90%;
            height: auto;
            object-fit: contain;
        }

        .right {

            width: 40%;
            display: flex;
            flex-direction: column;
            padding-bottom: 30px;
            gap: 25px;
            align-items: center;
            justify-content: center;
            border-left: 2px solid #a1a1a1;
        }

        .box {
            border: 2px solid black;
            display: flex;
            align-items: center;
            justify-content: space-between;
            /* width: 70%; */
            padding: 15px 20px;
            box-sizing: border-box;
            text-align: center;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 5px 10px 9px 1px rgba(0, 0, 0, 0.4);
            background: #ffffff;
            border-radius: 6px;
            cursor: pointer;
            width: 80%;
            max-width: 420px;
            height: auto;
        }

        .box:hover {
            transform: translateY(-3px);
            box-shadow: 8px 15px 15px rgba(0, 0, 0, 0.35);
        }

        .box img {
            width: 75px;
            height: 75px;
            margin-bottom: 10px;
        }

        button {
            padding: 8px 30px;
            cursor: pointer;
            border: 1px solid #333;
            background-color: white;
            font-weight: 600;
            transition: transform 0.2s ease, background-color 0.2s ease;
        }

        button:hover {
            background-color: #1d1d1d;
            color: white;
        }

        .info {
            margin: 0;
            display: flex;
            align-items: center;
            gap: 15px;
        }

        @media (max-width: 768px) {
            .container {
                flex-direction: column;
                height: auto;
            }

            .left,
            .right {
                width: 100%;
            }

            .left {
                padding: 30px 0;
            }
        }

        @media (max-width: 768px) {
            .left img {
                width: 95%;
                height: auto;
            }
        }
    </style>
</head>

<body>
    <h1>Online Examination Login Portal</h1>
    <hr>
    <div class="container">
        <div class="left">
            <img src="assets/images/cover.jpg" alt="image">
        </div>
        <div class="right">

            <div class="box">
                <div class="info">
                    <h4>Student Login</h4>
                    <img src="assets/icons/student.png" alt="student image">
                </div>
                <button onclick="location.href='pages/login.html?role=student'">Login</button>
            </div>

            <div class="box">
                <div class="info">
                    <h4>Teacher Login</h4>
                    <img src="assets/icons/teacher.png" alt="teacher image">
                </div>
                <button onclick="location.href='pages/login.html?role=teacher'">Login</button>
            </div>

            <div class="box">
                <div class="info">
                    <h4>Admin Login</h4>
                    <img src="assets/icons/admin.png" alt="Admin image">
                </div>
                <button onclick="location.href='pages/login.html?role=admin'">Login</button>
            </div>
        </div>

    </div>

</body>

</html>
